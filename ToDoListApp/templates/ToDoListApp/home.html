{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>To-Do List</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'ToDoListApp/style.css' %}">
</head>

<body class="vh-100 d-flex justify-content-center align-items-center">

    <div class="container text-center">

        <h4 class="fw-light text-white mb-3">
            Your Next-Gen Partner in Focus and Flow
        </h4>

        <h1 class="mb-4 fw-bold text-dark">
            The To-Do List App
        </h1>

        <div class="mb-4">

            <a href="{% url 'add_task' %}" class="btn btn-light btn-lg mx-2 shadow-sm">
                Add Task
            </a>

            <a href="{% url 'view_tasks' %}" class="btn btn-outline-light">
                View Tasks
            </a>

        </div>

        <div>

            <a href="{% url 'login' %}" class="btn btn-outline-light mx-2">
                Login
            </a>

            <a href="{% url 'register' %}" class="btn btn-outline-light mx-2">
                Register
            </a>

        </div>

    </div>

</body>

</html>
